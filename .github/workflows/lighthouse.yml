name: Performance Audit (Lighthouse)

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci

      - name: Gerar Build de Produção
        run: npm run build

      - name: Iniciar servidor Next em background
        run: npm run start &
        env:
          PORT: 3000

      - name: Esperar servidor subir
        run: npx wait-on http://localhost:3000

      - name: Executar Auditoria do Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
